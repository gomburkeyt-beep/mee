<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mommy ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:500px;
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    animation:pop .7s;
}

@keyframes pop{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

h1{
    color:#ff2d75;
    margin-bottom:20px;
}

p{
    font-size:22px;
    margin-bottom:25px;
    color:#444;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#ff2d75;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#e91e63;
}

.money{
    position:fixed;
    top:-50px;
    font-size:35px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(360deg);
    }
}
</style>

</head>
<body>

<div class="card" id="box">

<h1>❤️ Hi Mee!! ❤️</h1>

<p>
May gusto lang sana akong itanong...
</p>

<h2>Mahal mo ba ang anak mo? 🥺</h2>

<br>

<button onclick="yes()">Oo ❤️</button>

</div>

<script>

function yes(){

for(let i=0;i<40;i++){

let money=document.createElement("div");

money.innerHTML="💸";

money.className="money";

money.style.left=Math.random()*100+"vw";

money.style.animationDuration=(Math.random()*3+2)+"s";

money.style.fontSize=(Math.random()*20+25)+"px";

document.body.appendChild(money);

}

document.getElementById("box").innerHTML=`

<h1>🥹❤️ Thank You Meee ❤️🥹</h1>

<p style="font-size:28px">

Since mahal mo pala ang anak mo...

<br><br>

Pwede po ba akong makahingi ng allowance? 💸🥺

<br><br>

Love you, Me! ❤️

</p>

<button onclick="thanks()">

Sige Anak ❤️

</button>

`;

}

function thanks(){

alert("Yey!! Thank you Mommy! ❤️🥹 Love you so much!");

}

</script>

</body>
</html>
